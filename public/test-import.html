<!DOCTYPE html>
<html>
<head>
    <title>配置导入测试</title>
</head>
<body>
    <h1>配置导入测试</h1>
    <button onclick="testImport()">测试导入旧配置</button>
    <pre id="result"></pre>
    
    <script>
    async function testImport() {
        const token = localStorage.getItem('token');
        const result = document.getElementById('result');
        
        const testConfig = {
            "aiBaseUrl": "https://dashscope.aliyuncs.com/compatible-mode/v1",
            "aiApiKey": "sk-test-import",
            "aiModel": "qwen-turbo",
            "insightLevel": "STANDARD",
            "studentWordLimit": 100,
            "classWordLimit": 300,
            "starCount": 10,
            "insightDataSource": "CONVERSATIONS"
        };
        
        result.textContent = '发送请求...\n' + JSON.stringify(testConfig, null, 2);
        
        try {
            const res = await fetch('/api/system-config', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(testConfig)
            });
            
            const data = await res.json();
            
            result.textContent = `状态: ${res.status}\n\n响应:\n${JSON.stringify(data, null, 2)}`;
        } catch (error) {
            result.textContent = `错误: ${error.message}`;
        }
    }
    </script>
</body>
</html>
